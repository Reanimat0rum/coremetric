name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Set up Java 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Flet CLI
      run: |
        python -m pip install --upgrade pip
        pip install "flet-cli[all]==0.25.2"
        flet --version

    - name: Show project structure
      run: |
        echo "=== Project structure ==="
        ls -la
        echo ""
        echo "=== Python files ==="
        find . -maxdepth 2 -name "*.py" -o -name "*.yaml" | head -20
        echo ""
        echo "=== flet.yaml content ==="
        cat flet.yaml || echo "flet.yaml NOT FOUND"

    - name: Build APK
      id: build
      run: |
        flet build apk --verbose 2>&1 | tee build_log.txt
      continue-on-error: true

    - name: Show build log tail
      if: always()
      run: |
        echo "=== Last 100 lines of build log ==="
        tail -n 100 build_log.txt || echo "No build log found"

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build_log.txt
        retention-days: 7

    - name: Upload APK
      if: steps.build.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: coremetric-apk
        path: build/apk/app/outputs/flutter-apk/app-release.apk
        retention-days: 30