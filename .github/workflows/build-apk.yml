name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Set up Java 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true

    - name: Install Flet CLI
      run: |
        python -m pip install --upgrade pip
        pip install "flet-cli[all]==0.25.2"
        flet --version

    - name: Build APK
      run: flet build apk --verbose

    - name: Find APK files
      run: |
        echo "=== Searching for APK files ==="
        find build -name "*.apk" -type f
        echo ""
        echo "=== Build directory structure ==="
        find build -type f | head -50

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: coremetric-apk
        path: |
          build/**/*.apk
          build/apk/**/*.apk
        retention-days: 30
        if-no-files-found: warn

    - name: Upload entire build folder (fallback)
      uses: actions/upload-artifact@v4
      with:
        name: build-folder
        path: build/
        retention-days: 7
        if-no-files-found: warn