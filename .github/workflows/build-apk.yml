name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Set up Java 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Flutter SDK 3.41.7
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.7'
        channel: 'stable'
        cache: true

    - name: Install latest Flet CLI
      run: |
        python -m pip install --upgrade pip
        pip install "flet-cli[all]"
        flet --version
        flutter --version

    - name: Build APK
      run: |
        echo "y" | flet build apk --verbose

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: coremetric-apk
        path: build/apk/app-release.apk
        retention-days: 30