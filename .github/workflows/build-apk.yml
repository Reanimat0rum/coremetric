name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Set up Java 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Flutter SDK 3.41.7
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.7'
        channel: 'stable'
        cache: true

    - name: Install latest Flet CLI
      run: |
        python -m pip install --upgrade pip
        pip install "flet-cli[all]"
        flet --version
        flutter --version

    - name: Build APK
      run: |
        echo "y" | flet build apk --verbose 2>&1 | tee build.log
      continue-on-error: true

    - name: Search for APK files
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null
        echo ""
        echo "=== Build directory structure ==="
        find build -type f 2>/dev/null | head -100
        echo ""
        echo "=== Last 50 lines of build log ==="
        tail -n 50 build.log 2>/dev/null || echo "No build log found"

    - name: Upload all APK files
      uses: actions/upload-artifact@v4
      with:
        name: coremetric-apk
        path: |
          **/*.apk
        retention-days: 30
        if-no-files-found: warn

    - name: Upload build folder
      uses: actions/upload-artifact@v4
      with:
        name: build-folder
        path: build/
        retention-days: 7
        if-no-files-found: warn

    - name: Upload build log
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 7
        if-no-files-found: warn