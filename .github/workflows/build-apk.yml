name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Flet CLI
      run: pip install "flet-cli[all]==0.25.2"

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build APK
      run: flet build apk --verbose

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: coremetric-apk
        path: build/apk/app/outputs/flutter-apk/app-release.apk
        retention-days: 30